name: 🔥 Streak Keeper

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Duolingo Bot
        env:
          DUOLINGO_JWT: ${{ secrets.DUOLINGO_JWT }}
        run: node index.js
